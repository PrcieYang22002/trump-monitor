name: Trump Controversial Statement Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Needed to commit sent_articles.json back to the repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Monitor Script
      env:
        NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
        GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      run: python trump_monitor.py

    - name: Commit and push updated sent_articles.json
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add sent_articles.json
        # Only commit and push if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update sent_articles.json" && git push)
